[project]
site_name = "shadowquic"
site_description = "A 0-RTT QUIC proxy with SNI camouflage"
site_url = "https://spongebob888.github.io/shadowquic/"
repo_url = "https://github.com/spongebob888/shadowquic"
repo_name = "spongebob888/shadowquic"
edit_uri = ""
docs_dir = "docs"

# >>> generated nav
nav = [
  { "Home" = "index.md" },
  { "Configuration" = [
    { "Overview" = "configuration/index.md" },
    { "Inbound" = [
      { "Overview" = "configuration/inbound/index.md" },
      { "SOCKS5 server" = "configuration/inbound/socks.md" },
      { "ShadowQuic server" = "configuration/inbound/shadowquic.md" },
      { "SunnyQuic server" = "configuration/inbound/sunnyquic.md" }
    ] },
    { "Outbound" = [
      { "Overview" = "configuration/outbound/index.md" },
      { "SOCKS5 outbound" = "configuration/outbound/socks.md" },
      { "ShadowQuic outbound" = "configuration/outbound/shadowquic.md" },
      { "SunnyQuic outbound" = "configuration/outbound/sunnyquic.md" },
      { "Direct outbound" = "configuration/outbound/direct.md" }
    ] },
    { "Shared types" = [
      { "User authentication" = "configuration/shared/authuser.md" },
      { "JLS upstream" = "configuration/shared/jlsupstream.md" },
      { "Congestion control" = "configuration/shared/congestioncontrol.md" },
      { "Brutal parameters" = "configuration/shared/brutalparams.md" },
      { "Cipher suite preference" = "configuration/shared/ciphersuitepreference.md" },
      { "DNS strategy" = "configuration/shared/dnsstrategy.md" },
      { "Log level" = "configuration/shared/loglevel.md" }
    ] }
  ] }
]
# <<< generated nav

[project.theme]
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.expand",
  "navigation.top",
  "navigation.indexes",
  "content.code.copy",
  "content.code.annotate",
  "search.suggest",
  "search.highlight",
  "toc.follow"
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
